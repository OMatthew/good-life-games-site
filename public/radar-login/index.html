<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>HarrisRadar Login</title>
    <meta name="description" content="Private HarrisRadar preview login." />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --font-display: "Fraunces", Georgia, serif;
        --font-body: "Manrope", "Segoe UI", sans-serif;
        --surface-0: #f8faf9;
        --surface-1: #ffffff;
        --surface-3: #dbe4df;
        --ink-0: #16201d;
        --ink-1: #44534e;
        --ink-2: #6c7c76;
        --teal-0: #0f766e;
        --red-0: #991b1b;
        --shadow: 0 24px 60px -42px rgba(15, 23, 42, 0.6);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: clamp(1.4rem, 5vw, 3rem);
        font-family: var(--font-body);
        color: var(--ink-0);
        background:
          linear-gradient(115deg, rgba(216, 247, 241, 0.72), transparent 34%),
          radial-gradient(circle at 92% 10%, rgba(254, 243, 199, 0.9), transparent 32%),
          var(--surface-0);
      }

      .login-card {
        width: min(100%, 430px);
        border: 1px solid var(--surface-3);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
        padding: clamp(1.35rem, 5vw, 2rem);
        box-shadow: var(--shadow);
      }

      .eyebrow {
        margin: 0 0 0.75rem;
        color: var(--teal-0);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 0.85rem;
        font-family: var(--font-display);
        font-size: clamp(2.25rem, 10vw, 3.7rem);
        line-height: 1.1;
      }

      p {
        margin: 0 0 1.1rem;
        color: var(--ink-1);
        line-height: 1.55;
      }

      form {
        display: grid;
        gap: 0.85rem;
      }

      label {
        color: var(--ink-1);
        font-size: 0.84rem;
        font-weight: 800;
      }

      input {
        width: 100%;
        min-height: 46px;
        border: 1px solid var(--surface-3);
        border-radius: 8px;
        padding: 0.72rem 0.82rem;
        color: var(--ink-0);
        background: #fff;
        font: inherit;
      }

      input:focus {
        outline: 3px solid rgba(20, 184, 166, 0.18);
        border-color: var(--teal-0);
      }

      .password-row {
        position: relative;
      }

      .password-row input {
        padding-right: 3.1rem;
      }

      button {
        min-height: 46px;
        border: 0;
        border-radius: 8px;
        padding: 0.75rem 1rem;
        color: #fff;
        background: var(--teal-0);
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      button:hover,
      button:focus-visible {
        background: #0a5f59;
      }

      .toggle-password {
        position: absolute;
        top: 50%;
        right: 0.42rem;
        display: inline-grid;
        place-items: center;
        width: 2.2rem;
        height: 2.2rem;
        min-height: 0;
        transform: translateY(-50%);
        border: 0;
        border-radius: 6px;
        padding: 0;
        color: var(--ink-2);
        background: transparent;
      }

      .toggle-password:hover,
      .toggle-password:focus-visible {
        color: var(--ink-0);
        background: rgba(219, 228, 223, 0.72);
      }

      .toggle-password svg {
        width: 1.15rem;
        height: 1.15rem;
      }

      .toggle-password .icon-hidden {
        display: none;
      }

      .error {
        min-height: 1.25rem;
        margin: 0;
        color: var(--red-0);
        font-size: 0.9rem;
      }

      .hint {
        margin-top: 1rem;
        color: var(--ink-2);
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <main class="login-card" aria-labelledby="login-title">
      <p class="eyebrow">Private preview</p>
      <h1 id="login-title">HarrisRadar</h1>
      <p>Enter the shared HarrisRadar password to view the outline and dashboard preview.</p>
      <form method="post" action="/api/radar-login" autocomplete="on">
        <input id="next-path" name="next" type="hidden" value="/radar-app/" />
        <label for="radar-password">HarrisRadar password</label>
        <div class="password-row">
          <input
            id="radar-password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
          />
          <button
            class="toggle-password"
            id="toggle-password"
            type="button"
            aria-label="Show password"
            aria-pressed="false"
            title="Show password"
          >
            <svg class="show-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M2.5 12s3.5-6.5 9.5-6.5 9.5 6.5 9.5 6.5-3.5 6.5-9.5 6.5S2.5 12 2.5 12Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
              <path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4Z" stroke="currentColor" stroke-width="1.8" />
            </svg>
            <svg class="hide-icon icon-hidden" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="m3 3 18 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
              <path d="M10.6 5.7A9.8 9.8 0 0 1 12 5.5c6 0 9.5 6.5 9.5 6.5a16.3 16.3 0 0 1-2.7 3.5M7.1 7.4C4.2 9.1 2.5 12 2.5 12s3.5 6.5 9.5 6.5c1.8 0 3.4-.6 4.7-1.4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M10 9.1a3.2 3.2 0 0 1 4.1 4.1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            </svg>
          </button>
        </div>
        <button type="submit">Open HarrisRadar</button>
        <p class="error" id="login-error" aria-live="polite"></p>
      </form>
      <p class="hint">This preview is private and not indexed. Real parcel data remains behind server-side access control.</p>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const next = params.get('next');
      if (next && next.startsWith('/') && !next.startsWith('//')) {
        document.getElementById('next-path').value = next;
      }

      const error = params.get('error');
      const errorEl = document.getElementById('login-error');
      if (error === 'password') {
        errorEl.textContent = 'That password did not work.';
      } else if (error === 'config') {
        errorEl.textContent = 'Server-side access is not configured yet.';
      }

      const passwordInput = document.getElementById('radar-password');
      const togglePassword = document.getElementById('toggle-password');
      const showIcon = togglePassword.querySelector('.show-icon');
      const hideIcon = togglePassword.querySelector('.hide-icon');

      togglePassword.addEventListener('click', () => {
        const isVisible = passwordInput.type === 'text';
        passwordInput.type = isVisible ? 'password' : 'text';
        togglePassword.setAttribute('aria-label', isVisible ? 'Show password' : 'Hide password');
        togglePassword.setAttribute('aria-pressed', String(!isVisible));
        togglePassword.title = isVisible ? 'Show password' : 'Hide password';
        showIcon.classList.toggle('icon-hidden', !isVisible);
        hideIcon.classList.toggle('icon-hidden', isVisible);
        passwordInput.focus();
      });
    </script>
  </body>
</html>
